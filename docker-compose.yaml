services:
  chromadb:                                                                                                                                                                       
    image: chromadb/chroma:1.5.1.dev68                                                                                                                                            
    ports:                                                                                                                                                                        
      - "8001:8000"                                                                                                                                                                                                                                                                                                        
    environment:                                                                                                                                                                  
      - IS_PERSISTENT=TRUE                                                                                                                                                        
      - ANONYMIZED_TELEMETRY=FALSE
      - PYTHONUNBUFFERED=1                                                                                                                                                
    healthcheck:                                                                                                                                                                  
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
  streamlit:
    build:
      context: .
      dockerfile: docker/Dockerfile.streamlit
    ports:
      - "8501:8501"
    depends_on:
      chromadb:
        condition: service_healthy
    environment:
      - INFERENCE_SERVICE_URL=http://inference_service:8000
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
  inference_service:
    build:
      context: .
      dockerfile: docker/Dockerfile.inference_service
    ports:
      - "8002:8000"
    depends_on:
      chromadb:
        condition: service_healthy
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - PYTHONUNBUFFERED=1
  ingestion_service:
    build:
      context: .
      dockerfile: docker/Dockerfile.ingestion_service
    ports:                                                                                                                                                                        
      - "8003:8000"
    depends_on:
      chromadb:
        condition: service_healthy
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - PYTHONUNBUFFERED=1
  document_management_service:
    build:
      context: .
      dockerfile: docker/Dockerfile.document_management_service
    ports:                                                                                                                                                                        
      - "8004:8000"
    depends_on:
      dms-db:
        condition: service_healthy
    environment:
      - DMS_DATABASE_URL=postgresql://dms:dms@dms-db:5432/dms
  dms-db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "dms", "-q"]
      interval: 10s
      timeout: 5s
      retries: 5